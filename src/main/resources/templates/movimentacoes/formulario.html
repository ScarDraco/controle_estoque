<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstoqueMaster - Movimentação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 550px;">
        <div class="mb-4">
            <h4 class="fw-bold text-warning text-dark">🔄 Movimentar Estoque</h4>
            <p class="text-muted small">Registre uma ENTRADA (compra/reposição) ou SAÍDA (venda/baixa) de itens.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-warning">
            Você precisa cadastrar pelo menos um <strong>Produto</strong> antes de fazer movimentações!
        </div>

        <form th:if="${not #lists.isEmpty(produtos)}" th:action="@{/movimentacoes/salvar}" method="post">
            
            <div class="mb-3">
                <label for="produtoId" class="form-label fw-semibold">Selecione o Produto</label>
                <select id="produtoId" name="produtoId" class="form-select" required>
                    <option value="" disabled selected>Escolha o produto...</option>
                    <option th:each="prod : ${produtos}" th:value="${prod.id}" th:text="${prod.nome} + ' (Atual: ' + ${prod.quantidade} + ')'"></option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="tipo" class="form-label fw-semibold">Tipo de Operação</label>
                    <select id="tipo" name="tipo" class="form-select" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="quantidade" class="form-label fw-semibold">Quantidade</label>
                    <input type="number" id="quantidade" name="quantidade" class="form-control" min="1" required>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/produtos}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary fw-semibold">Confirmar Operação</button>
            </div>
        </form>
    </div>

</body>
</html>
