<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstoqueMaster - Nova Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
        <div class="mb-4">
            <h4 class="fw-bold text-primary">📂 Nova Categoria</h4>
            <p class="text-muted small">Categorias ajudam a organizar seu estoque e são obrigatórias para os produtos.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <form th:action="@{/categorias/salvar}" method="post">
            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome da Categoria</label>
                <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: Eletrônicos, Bebidas, Limpeza" required>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/produtos}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary fw-semibold">Salvar Categoria</button>
            </div>
        </form>
    </div>

</body>
</html>
