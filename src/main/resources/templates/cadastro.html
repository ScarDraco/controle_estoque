<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-success">Registar Usuário</h3>
            <p class="text-muted">Crie suas credenciais de acesso</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/cadastro}" method="post">
            <div class="mb-3">
                <label for="login" class="form-label fw-semibold">Escolha um Usuário (Login)</label>
                <input type="text" id="login" name="login" class="form-control" placeholder="Ex: admin, joao_silva" required>
                <div class="form-text text-muted">O nome de usuário deve ser único.</div>
            </div>
            
            <div class="mb-3">
                <label for="senha" class="form-label fw-semibold">Escolha uma Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" placeholder="Crie uma senha segura" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-2">Finalizar Cadastro</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">Já possui acesso? </span>
            <a th:href="@{/login}" class="text-decoration-none fw-semibold text-success">Voltar para o Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
