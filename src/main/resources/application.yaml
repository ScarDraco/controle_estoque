spring:
  application:
    name: controle_estoque

  datasource:
   
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/controle_estoque?createDatabaseIfNotExist=true&serverTimezone=UTC}"
    username: "${SPRING_DATASOURCE_USERNAME:root}"
    password: "${SPRING_DATASOURCE_PASSWORD:Kinho@123}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true


server:
  port: "${PORT:8080}"